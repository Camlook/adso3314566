<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36-transitions</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        main section {
            img {
                all: unset;
                margin-bottom: 30px;
                filter: drop-shadow(0 0 12px #5e00aa);
                margin: 0 auto;
                display: flex;
            }
            img.transition01{
                transition: transform 0.5s ease-in;
                &:hover {
                    transform: scale(1.3);
                }
            }
            img.transition02{
                transition: transform 0.5s ease-out;
                &:hover {
                    transform: rotate(-0.5turn);
                }
            }
            img.transition03{
                transition: transform 0.5s ease-in-out;
                &:hover {
                    transform: rotateY(180deg);
                }
            }
            img.transition04{
                transition: transform 0.5s linear;
                &:hover {
                    transform: TranslateX(100px);
                }
            }
            .box{
                background-color: #fff;
                height: 80px;
                margin-top: 2rem;
                width: 80px;
                transition: width 1s,
                            height 1s 1s,
                            background-color 1s 2s;
                &:hover{
                    background-color: rgb(48, 255, 134);
                    height: 250px;
                    width: 350px;
                }
            }
        }
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>36-Transitions</h1> <br>
            <h2>Enable you to define the transition between two states of an element.</h2>
        </header>
    <section>
        <h3>Scale(1.3)</h3>
        <img src="imgs/dk.png" alt="DK" class="transition01">
        <br>
        <h3>Rotate(-180deg)</h3>
        <img src="imgs/dk.png" alt="DK" class="transition02">
        <br>
        <h3>RotateY(180deg)</h3>
        <img src="imgs/dk.png" alt="DK" class="transition03">
        <br>
        <h3>TranslateX(100px)</h3>
        <img src="imgs/dk.png" alt="DK" class="transition04">
        <br>
        <h3>Multiple</h3>
        <div class="box"></div>
    </main>
</body>
</html>
