<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>31-Filters</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        .img1 img {
            all: unset;
            margin: 0 auto;
            display: flex;
        }

        .img2 img {
            all: unset;
            margin: 0 auto;
            display: flex;
            filter: blur(5px);
            transition: filter 0.5s ease;
        }

        .img2 img:hover {
            filter: none;
        }

        .img3 img {
            all: unset;
            margin: 0 auto;
            display: flex;
            filter: Brightness(2);
            transition: filter 0.5s ease;
        }

        .img3 img:hover {
            filter: none;
        }

        .img4 img {
            all: unset;
            margin: 0 auto;
            display: flex;
            filter: Sepia();
            transition: filter 0.5s ease;
        }

        .img4 img:hover {
            filter: none;
        }

        .img5 img {
            all: unset;
            margin: 0 auto;
            display: flex;
            filter: Contrast(2);
            transition: filter 0.5s ease;
        }

        .img5 img:hover {
            filter: none;
        }

        .img6 img {
            all: unset;
            margin: 0 auto;
            display: flex;
            filter: Invert();
            transition: filter 0.5s ease;
        }

        .img6 img:hover {
            filter: none;
        }

        .img7 img {
            all: unset;
            margin: 0 auto;
            display: flex;
            filter: saturate(2);
            transition: filter 0.5s ease;
        }

        .img7 img:hover {
            filter: none;
        }
    </style>
</head>

<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256">
            <path
                d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
            </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>31-Filters</h1> <br>
            <h2>Defines visual effects (like blur and saturation).</h2>
        </header>
        <section>
            <h3>Normal</h3>
            <div class="img1"><img src="/03-css/imgs/frio.webp" alt=""></div>
            <br>
            <h3>Blur</h3>
            <div class="img2"><img src="/03-css/imgs/frio.webp" alt=""></div>
            <br>
            <h3>Brightness</h3>
            <div class="img3"><img src="/03-css/imgs/frio.webp" alt=""></div>
            <br>
            <h3>Sepia</h3>
            <div class="img4"><img src="/03-css/imgs/frio.webp" alt=""></div>
            <br>
            <h3>Contrast</h3>
            <div class="img5"><img src="/03-css/imgs/frio.webp" alt=""></div>
            <br>
            <h3>Invert</h3>
            <div class="img6"><img src="/03-css/imgs/frio.webp" alt=""></div>
            <br>
            <h3>Saturation</h3>
            <div class="img7"><img src="/03-css/imgs/frio.webp" alt=""></div>
        </section>
    </main>
</body>

</html>
