<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Percentage Units</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        main {
            width: 100%;
            section.percentage {
                margin: auto;
                width: 100%;
                div.parent {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    div {
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 50dvh;
                        font-size: 2rem;
                        &.child1 {
                            width: 70%;
                            background: #5eec5e;
                        }
                        &.child2 {
                            width: 30%;
                            background: #6916ac;
                        }
                    }
                }
            }
        }
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>10-Percentage Units</h1> <br>
            <h2>Are relative to the size of the parent element.</h2>
        </header>
    <section class="percentage">
        <div class="parent">
            <div class="child1">70%</div>
            <div class="child2">30%</div>
        </div>
    </section>
    </main>
</body>
</html>
