<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37-animations</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        main section{
            div.jungle{
                background: url(imgs/jungle.png) no-repeat center;
                border-radius: 4px;
                margin-block: 2rem;
                position: relative;
                height: 471px;
                width: 380px;
                margin: 0 auto;
                display: flex;
                img {
                    all: unset;
                    position: absolute;
                }
                img.logo{
                    top: 25px;
                    left: 30px;
                    height: 72px;
                    object-fit: contain;
                    z-index: 9;
                    width: 317px;
                    animation: 2s animLogo ease-in infinite;
                }
                img.dk{
                    top: 190px;
                    left: 125px;
                    width: 140px;
                    object-fit: contain;
                    z-index: 8;
                    animation: 2s animDk ease-out infinite;
                }
                div.move{
                    position: absolute;
                    top: 290px;
                    left: 0px;
                    animation: 2s animMove linear infinite;
                    img.ryno{
                        width: 160px;
                        object-fit: contain;
                        top: 0;
                        animation: 0.2s animRyno linear infinite;
                    }
                }
            }
        }
        @keyframes animLogo {
            0%, 100% {
                transform: scale(1)
            }
            50% {
                transform: scale(1.2);
            }
        }
        @keyframes animDk{
            0% {top: 190px; transform: rotateY(0deg);}
            40% {top: 80px; transform: rotateX(0deg);}
            50% {top: 80px; transform: rotateX(360deg);}
            60% {top: 80px; transform: rotateX(360deg);}
            100% {top: 190px; transform: rotateX(360deg);}
        }
        @keyframes animRyno{
            0%, 100% {top: 0px;}
            50% {top: -8px;}
        }
        @keyframes animMove{
            0% {left: 0; transform: scaleX(1);}
            20% {left: 30px; transform: rotate(20deg) scaleX(1);}
            40% {left: 40px; transform: rotate(-50deg) scaleX(1);}
            60% {left: 100px; transform: scaleX(1);}
            70% {left: 180px; transform: scaleX(1);}
            80% {left: 380px; transform: scaleX(-1);}
            85% {left: 330px; transform: scaleX(-1);}
            87% {left: 250px; transform: scaleX(-1);}
            90% {left: 180px; transform: scaleX(-1);}
            92% {left: 120px; transform: scaleX(1);}
            96% {left: 70px; transform: scaleX(1);}
            98% {left: 50px; transform: scaleX(1);}
            100% {left: 0px; transform: scaleX(1);}
        }
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>37-Animations</h1> <br>
            <h2>Lets an element gradually change from one style to another.</h2>
        </header>
    <section>
        <div class="jungle">
            <img src="imgs/logo-dk.png" alt="" class="logo">
            <img src="imgs/dk.png" alt="" class="dk">
            <div class="move">
                <img src="imgs/ryno.png" alt="" class="ryno">
            </div>
        </div>
    </section>
    </main>
</body>
</html>
