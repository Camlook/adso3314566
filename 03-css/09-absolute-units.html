<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09-Absolute Units</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        ul {
            font-family: 'Roboto Slab', serif;
        }

        .abs1 {
            font-size: 0.5in;
        }
        .abs2 {
            font-size: 1cm;
        }
        .abs3 {
            font-size: 10mm;
        }
        .abs4 {
            font-size: 12pt;
        }
        .abs5 {
            font-size: 2pc;
        }
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>09-Absolute Units</h1> <br>
            <h2>Specify a fixed length value. It doesn't matter if the screen's width or height changes.</h2>
        </header>
        <ul>
            <li>inch (in)</li>
            <li>centimeter (cm)</li>
            <li>millimeter (mm)</li>
            <li>point (pt)</li>
            <li>pica (pc)</li>
        </ul>
    <section>
        <ul>
            <li class="abs1">0.5 inch (in)</li>
            <li class="abs2">1 centimeter (cm)</li>
            <li class="abs3">10 millimeter (mm)</li>
            <li class="abs4">12 point (pt)</li>
            <li class="abs5">2 pica (pc)</li>
        </ul>
    </section>
    </main>
</body>
</html>
