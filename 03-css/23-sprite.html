<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23-Sprite</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        div#sprite {
            background: url(imgs/anim-sprite.png) no-repeat;
            height: 256px;
            margin: 1rem auto;
            width: 256px;
        }
        div#sprite.sp1 {background-position: calc(-256px * 0) 0;}
        div#sprite.sp2 {background-position: calc(-256px * 1) 0;}
        div#sprite.sp3 {background-position: calc(-256px * 2) 0;}
        div#sprite.sp4 {background-position: calc(-256px * 3) 0;}
        div#sprite.sp5 {background-position: calc(-256px * 4) 0;}
        div#sprite.sp6 {background-position: calc(-256px * 5) 0;}

        div#sprite1 {
            background: url(imgs/asd.png) no-repeat;
            height: 350px;
            margin: 1rem auto;
            width: 350px;
        }
        div#sprite1.d1 {background-position: calc(-350px * 0) 0;}
        div#sprite1.d2 {background-position: calc(-350px * 1) 0;}
        div#sprite1.d3 {background-position: calc(-350px * 2) 0;}
        div#sprite1.d4 {background-position: calc(-350px * 3) 0;}
        div#sprite1.d5 {background-position: calc(-350px * 4) 0;}
        div#sprite1.d6 {background-position: calc(-350px * 5) 0;}
        div#sprite1.d7 {background-position: calc(-350px * 6) 0;}
        div#sprite1.d8 {background-position: calc(-350px * 7) 0;}
        div#sprite1.d9 {background-position: calc(-350px * 8) 0;}
        div#sprite1.d10 {background-position: calc(-350px * 9) 0;}
        div#sprite1.d11 {background-position: calc(-350px * 10) 0;}

        div#sno {
            background: url(imgs/snoopy.png) no-repeat;
            height: 256px;
            margin: 1rem auto;
            width: 256px;
        }
        div#sno.sn1 {background-position: calc(-256px * 0) 0;}
        div#sno.sn2 {background-position: calc(-256px * 1) 0;}
        div#sno.sn3 {background-position: calc(-256px * 2) 0;}
        div#sno.sn4 {background-position: calc(-256px * 3) 0;}
        div#sno.sn5 {background-position: calc(-256px * 4) 0;}
        div#sno.sn6 {background-position: calc(-256px * 5) 0;}
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>23-Sprite</h1> <br>
            <h2>An image sprite is a collection of images put into a single image.</h2>
        </header>
    <section>
        <h3>Runner</h3>
        <div id="sprite" class="sp1"></div>
    </section>
    <section>
        <h3>Idle</h3>
        <div id="sprite1" class="d1"></div>
    </section>
    <section>
        <h3>Angry</h3>
        <div id="sno" class="sn1"></div>
    </section>
    </main>
    <script>
        const sprite = document.getElementById('sprite')
        const numSprite = 6
        let count = 1
        setInterval(() => {
            sprite.className= ''
            sprite.classList.add('sp'+count)
            if(count == numSprite) count=1
            else count++
        }, 80)
    </script>
    <script>
        const sprite1 = document.getElementById('sprite1')
        const numSprite1 = 11
        let count1 = 1
        setInterval(() => {
            sprite1.className= ''
            sprite1.classList.add('d'+count1)
            if(count1 == numSprite1) count1=1
            else count1++
        }, 80)
    </script>
    <script>
        const sno = document.getElementById('sno')
        const numSno = 11
        let count2 = 1
        setInterval(() => {
            sno.className= ''
            sno.classList.add('sn'+count2)
            if(count2 == numSno) count2=1
            else count2++
        }, 80)
    </script>
</body>
</html>
