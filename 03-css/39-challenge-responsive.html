<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Freckle+Face&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet');

        body {
            background: url(https://m.gettywallpapers.com/wp-content/uploads/2022/07/Omnitrix-PC-Wallpaper.jpg) no-repeat;
            background-size: cover;
            font-family: Poppins;
        }

        .logo img {
            margin: 0 auto;
            display: flex;
        }

        .seasons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            width: 300px;
            height: 200px;
            border: 3px solid rgb(5, 145, 0);
            background: url('https://w0.peakpx.com/wallpaper/944/716/HD-wallpaper-smart-watch-ben-10-green-light-animated.jpg') center no-repeat;
            background-size: cover;
            overflow: hidden;
            position: relative;
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 6px 30px rgba(9, 255, 0, 0.473);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;

            background: rgba(0, 0, 0, 0.8);
            color: white;

            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>

<body>
    <div class="logo">
        <img src="imgs/logo10.png" alt="">
    </div>
    <section class="seasons">
        <div class="card">
            <img src="imgs/b10s1.png" alt="" class="s1">
            <div class="info">Ben Tennyson - Original</div>
        </div>
        <div class="card">
            <img src="imgs/b10s2.png" alt="" class="s2">
            <div class="info">Ben Tennyson - Alien Force</div>
        </div>
        <div class="card">
            <img src="imgs/b10s3.png" alt="" class="s3">
            <div class="info">Ben Tennyson - Ultimate Alien</div>
        </div>
        <div class="card">
            <img src="imgs/b10s4.png" alt="" class="s4">
            <div class="info">Ben Tennyson - Omniverse</div>
        </div>
    </section>
</body>

</html>
