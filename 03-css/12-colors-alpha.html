<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Colors Alpha</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        figure.ben10 {
            background: url(imgs/ben10.png) no-repeat center / contain;
            border: 4px solid #666;
            margin-block: 4rem;
            width: 380px;
            height: 380px;
            div {
                height: calc(380px / 3);
                &.box1 {
                    background-color: rgba(0, 255, 34, 0.124);
                }
                &.box2 {
                    background-color: #00ff1516;
                }
                &.box3 {
                    background-color: hsla(140, 100%, 50%, 0.059);
                }
            }
        }
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>12-Colors Alpha</h1> <br>
            <h2>The fourth alpha channel allows you to apply opacity or transparency to the color.</h2>
        </header>
    <section>
        <h3>Example Transparent Colors</h3>
        <figure class="ben10">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box3"></div>
        </figure>
    </section>
    </main>
</body>
</html>
