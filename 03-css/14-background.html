<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14-Background</title>
    <link rel="stylesheet" href="../src/css/css.css">
    <style>
        div.backgroundcolor {
            background-color:rgb(53, 196, 84);
            width: 350px;
            height: 350px;
            margin: 2rem auto;
        }
        div.backgroundimgrepeat {
            background: url(../src/imgs/patron3.jpg) repeat center / contain;
            width: 350px;
            height: 350px;
            margin: 2rem auto;
        }
        div.backgroundrepeat {
            background: url(../src/imgs/patron3.jpg) no-repeat center / contain;
            width: 350px;
            height: 350px;
            margin: 2rem auto;
        }
        div.backgroundposition {
            background: url(../src/imgs/patron2.avif) no-repeat center / contain;
            background-position: 100% 100%;
            width: 350px;
            height: 350px;
            margin: 2rem auto;
        }
        div.backgroundsize {
            background: url(../src/imgs/patron2.avif) no-repeat center / cover;
            background-size: 100% 100%;
            width: 350px;
            height: 350px;
            margin: 2rem auto;
        }
        div.backgroundattachment {
            background: url(../src/imgs/patron.jpg) no-repeat center / contain fixed;
            width: 350px;
            height: 350px;
            margin: 2rem auto;
        }
    </style>
</head>
<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>14-Background</h1> <br>
            <h2>
                - background-color <br>
                - background-image <br>
                - background-repeat <br>
                - background-position <br>
                - background-size <br>
                - background-attachment
        </h2>
        </header>
    <section>
        <h3>Background Color</h3>
        <div class="backgroundcolor">
        </div>
        <h3>Background Image</h3>
        <div class="backgroundimgrepeat">
        </div>
        <h3>Background Repeat</h3>
        <div class="backgroundrepeat">
        </div>
        <h3>Background Position</h3>
        <div class="backgroundposition">
        </div>
        <h3>Background Size</h3>
        <div class="backgroundsize">
        </div>
        <h3>Background Attachment</h3>
        <div class="backgroundattachment">
        </div>
    </section>
    </main>
</body>
</html>
