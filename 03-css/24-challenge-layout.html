<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main{
            background-color: #17a053;
            border: 4px solid #fff;
            min-height: 100dvh;
            div.logo{
                background: url(imgs/spriteweb.png) no-repeat;
                background-position: -20px -434px;
                height: 120px;
                margin: 1rem auto;
                width: 180px;
            }
        }

        #menu ul{
            display: flex;
            justify-content: center;
            gap: 25px;
            list-style-type: none;
            margin-bottom: 40px;
            flex-wrap: wrap;
            text-align: center;
            font-family: roboto slab;
        }

        #menu ul li a{
            display: block;
            width: 170px;
            padding: 25px 0;
            background: #065b28;
            color: white;
            text-decoration: none;
            font-size: 20px;
            border-bottom: 6px solid white;
            transition: 0.3s;
        }

        #menu ul li a:hover{
            background: #043215;
            transform: translateY(-5px);
        }

        #sprites.sprites{
            width: 90%;
            max-width: 1200px;
            margin: auto;
            background: #065b28;
            padding: 30px;

            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        #card.card{
            width: 300px;
            height: 200px;

            border: 3px solid white;
            
            background-image: url(imgs/spriteweb.png);
            background-position: -490px -7px;

            overflow: hidden;

            transition: 0.3s;
        }
        
        #card.card:hover{
            transform: scale(1.03);
        }

        #titulo.titulo{
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #contenido.contenido{
            width: 90%;
            max-width: 1200px;

            margin: 50px auto;
            background-color: #ffffff;
            padding: 40px;
            

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            flex-wrap: wrap;
        }

        #icono.icono{
            background: url(imgs/spriteweb.png);
            background-position: -280px -500px;
            width: 100px;
            height: 100px;
        }

        #contenido.contenido p{
            flex: 1;
            min-width: 300px;
            font-size: 20px;
            line-height: 1.8;
            color: #444;
            text-align: justify;
        }

        #lata.lata{
            background: url(imgs/spriteweb.png);
            background-position: -900px -215px;
            width: 80px;
            height: 150px;
        }
    </style>
</head>
<body>
    <main>
    <div class="logo"></div>
    <nav id="menu" class="menu">
        <ul>
            <li><a href="">INICIO</a></li>
            <li><a href="">NOSOTROS</a></li>
            <li><a href="">PORTAFOLIO</a></li>
            <li><a href="">SERVICIOS</a></li>
            <li><a href="">CONTACTOS</a></li>
        </ul>
    <section id="sprites" class="sprites">
        <div id="card" class="card">
            <div id="titulo" class="titulo">
                Sprite 01
            </div>
        </div>
                <div id="card" class="card">
            <div id="titulo" class="titulo">
                Sprite 02
            </div>
        </div>
                <div id="card" class="card">
            <div id="titulo" class="titulo">
                Sprite 03
            </div>
        </div>
    </section>
    <section id="contenido" class="contenido">
        <div id="icono" class="icono"></div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quae aspernatur ab doloremque exercitationem alias ex ad facere. Odio alias veritatis vel veniam ratione magnam ex beatae, ipsa quasi odit atque.</p>
        <div id="lata" class="lata"></div>
    </section>
    
    </nav>
    </main>
</body>
</html>
