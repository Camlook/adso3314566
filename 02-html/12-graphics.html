<body>
    <a href="/02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256">

                d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">

    <main>
        <header>
            <h1>12-Graphics</h1> <br>
            <h2>Creates inline graphics with tags.</h2>
        </header>
        <section>
            <h3>SVG Graphics</h3>
            <p>SVG (Scalable Vector Graphics) allows you to create graphics directly in HTML.</p>
            <svg width="100" height="100">
                <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
            </svg>
            <svg width="100" height="100">
                <rect width="90" height="90" x="5" y="5" stroke="black" stroke-width="3" fill="blue" />
            </svg>
            <svg width="100" height="100">
                <polygon points="50,10 90,90 10,90" stroke="purple" stroke-width="3" fill="yellow" />
            </svg>
            <svg width="100" height="100">
                <line x1="10" y1="10" x2="90" y2="90" stroke="green" stroke-width="3" />
            </svg>
            <br><br>
            <h3>Canvas Graphics</h3>
            <p>The &lt;canvas&gt; element allows for dynamic, scriptable rendering of 2D shapes and bitmap images.</p>
            <canvas id="myCanvas" width="200" height="100" style="border:1px solid #ffffff;"></canvas>
            <script>
                var canvas = document.getElementById('myCanvas');
                var ctx = canvas.getContext('2d');
                ctx.fillStyle = 'orange';
                ctx.fillRect(10, 10, 150, 80);
            </script>

        </section>
    </main>
</body>

</html>
