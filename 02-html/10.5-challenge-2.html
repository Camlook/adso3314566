<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00-Title</title>
    <link rel="stylesheet" href="../src/css/html.css">
</head>
<style>
    section {
        max-width: 800px;
    }
    table {
        width: 600px;
        border-collapse: collapse;
    }

    td {
        height: 60px;
        border: 2px solid #555;
    }

    .gris {
        background: #3a3a3a;
    }

    .negro {
        background: #000;
        text-align: center;
        font-size: 20px;
    }
</style>

<body>
    <a href="/02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256">
            <path
                d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
            </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>10.5-Challenge 2: Tables</h1> <br>
            <h2>Practices table creation and structure.</h2>
        </header>
        <section>
            <h3>Challenge</h3>
            <br>
                <table>
                    <tr>
                        <td class="gris" colspan="4"></td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="3"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="3"></td>
                        <td class="negro">😎</td>
                        <td class="negro" rowspan="2">😎</td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="2"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="2"></td>
                        <td class="negro">😎</td>
                        <td class="gris"></td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="2"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="2"></td>
                        <td class="negro">😎</td>
                        <td class="negro" colspan="2">😎</td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="2"></td>
                    </tr>
                    <tr>
                        <td class="gris"></td>
                        <td class="negro">😎</td>
                        <td class="negro" colspan="4">😎</td>
                        <td class="negro">😎</td>
                        <td class="gris"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="2"></td>
                        <td class="negro">😎</td>
                        <td class="negro" colspan="2">😎</td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="2"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="3"></td>
                        <td class="negro">😎</td>
                        <td class="gris"></td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="2"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="4"></td>
                        <td class="negro">😎</td>
                        <td class="negro">😎</td>
                        <td class="negro">😎</td>
                        <td class="gris"></td>
                    </tr>
                    <tr>
                        <td class="gris" colspan="4"></td>
                        <td class="negro">😎</td>
                        <td class="gris" colspan="3"></td>
                    </tr>

                </table>
        </section>
    </main>
</body>

</html>
