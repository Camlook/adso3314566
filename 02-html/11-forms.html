<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>00-Title</title>
  <link rel="stylesheet" href="../src/css/html.css" />
</head>
<style>
  body {
    background-color: #121212;
    font-family: Arial, sans-serif;
  }

  main {
    max-width: 800px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
  }

  header h1 {
    color: white;
    margin-bottom: 5px;
  }

  header h2 {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 20px;
  }

  section h2 {
    color: #fff;
    margin-top: 25px;
    margin-bottom: 10px;
    font-size: 16px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input,
  textarea,
  select,
  progress {
    padding: 8px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #2a2a2a;
    color: white;
  }

  input:focus,
  textarea:focus,
  select:focus {
    border: 1px solid #ff7e27;
  }

  fieldset {
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px;
  }

  legend {
    color: #5e5e5e;
    padding: 0 5px;
  }

  label {
    color: #5e5e5e;
  }

  .inline {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button {
    background: #ff7e27;
    color: white;
    cursor: pointer;
  }

  input,
  textarea,
  select {
    width: 100%;
    box-sizing: border-box;
  }

  input[type="radio"],
  input[type="checkbox"] {
    width: auto;
    margin: 0;
  }
</style>

<body>
  <a href="/02-html/index.html" class="btn-home">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256">
      <path
        d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
      </path>
    </svg>
  </a>

  <main>
    <header>
      <h1>11-Forms</h1>
      <h2>Creates interactive forms for user input.</h2>
    </header>

    <section>
      <h2>Complete Form</h2>

      <form>

        <fieldset>
          <legend>Text Inputs</legend>

          <label>Name:</label>
          <input type="text" name="name">
          <br><br>
          <label>Password:</label>
          <input type="password" name="password">
          <br><br>
          <label>Email:</label>
          <input type="email" name="email">
          <br><br>
          <label>Search:</label>
          <input type="search" name="search">
        </fieldset>

        <fieldset>
          <legend>Numbers & Dates</legend>

          <label>Number:</label>
          <input type="number" name="number">
          <br>
          <label>Range:</label>
          <input type="range" name="range">
          <br>
          <label>Date:</label>
          <input type="date" name="date">
          <br>
          <label>Time:</label>
          <input type="time" name="time">
          <br>
          <label>Week:</label>
          <input type="week" name="week">
          <br>
          <label>Month:</label>
          <input type="month" name="month">
        </fieldset>

        <fieldset>
          <legend>Pickers</legend>

          <label>Color:</label>
          <input type="color" name="color">
          <br>
          <label>File:</label>
          <input type="file" name="file">
        </fieldset>
        <fieldset>
          <legend>Options</legend>

          <div class="inline">
            <input type="radio" name="gender" value="male">
            <label>Male</label>
          </div>
          <div class="inline">
            <input type="radio" name="gender" value="female">
            <label>Female</label>
          </div>

          <div class="inline">
            <input type="checkbox" name="terms">
            <label>Accept terms</label>
          </div>

        </fieldset>

        <fieldset>
          <legend>Select & Textarea</legend>

          <select name="options">
            <option>Option 1</option>
            <option>Option 2</option>
            <option>Option 3</option>
          </select>
          <br><br>
          <textarea rows="4" placeholder="Write something..."></textarea>

        </fieldset>

        <fieldset>
          <legend>Progress</legend>
          <progress value="60" max="100"></progress>
        </fieldset>

        <fieldset>
          <legend>Buttons</legend>

          <button type="submit">Submit</button>
          <button type="reset">Reset</button>

        </fieldset>

      </form>

    </section>
  </main>
</body>

</html>
