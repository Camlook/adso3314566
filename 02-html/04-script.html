    <main>

    <section>
        <h3>JavaScript</h3>
        <h4 class="user"></h4>
    </section>
    </main>
    <script>
        const user = document.querySelector(".user");
        const answer = prompt("What's your name?");
        if(answer) {
            user.textContent = '😎 Welcome, '+ answer +'!';
        } else {
            user.textContent = '🫠 Welcome... Guest.';
        }
    </script>
